services:
  - type: web
    name: mindspace-backend
    runtime: python
    rootDir: MindSpace
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MINDSPACE_SECRET_KEY
        sync: false